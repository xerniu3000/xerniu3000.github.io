<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" content="#000a0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OKATAN" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="okatan-icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="okatan-icon-192.png" />
  <link rel="apple-touch-icon" href="okatan-icon-512.png" />

  <title>OKATAN | V83.00</title>
  <style>
    :root { --halo: #4df2ff; --bg: #000a0d; }

    body, html {
      margin: 0;
      padding: 0;
      font-family: "Share Tech Mono", "Consolas", "Courier New", monospace;
      background: var(--bg);
      color: var(--halo);
      height: 100dvh;
      overflow: hidden;
      transition: background 0.5s ease;
      touch-action: none;
    }

    body.offline-active { --halo: #3eff4d !important; }
    body.offline-active .bg-layer {
      background: radial-gradient(circle at center, #005c1a 0%, #000a0d 100%) !important;
    }

    body.minimal-active .bg-layer {
      animation: none !important;
      opacity: 0.18 !important;
    }

    body.minimal-active #okatan-entity {
      animation: none !important;
      opacity: 0.55;
      box-shadow: 0 0 10px var(--halo);
    }

    body.minimal-active .pulse-ring {
      animation: none !important;
      opacity: 0.25;
      width: 22px !important;
      height: 22px !important;
    }

    #orbit-canvas { position: absolute; inset: 0; z-index: 4; pointer-events: none; }

    .emergency-active {
      --halo: #ff3e3e !important;
      background: #200 !important;
      animation: glitch-shake 0.2s infinite;
    }

    .emergency-active .bg-layer {
      background: radial-gradient(circle at center, #800 0%, #000 100%) !important;
    }

    @keyframes glitch-shake {
      0% { transform: translate(0); text-shadow: 2px 0 red, -2px 0 blue; }
      50% { transform: translate(-1px, 1px); text-shadow: -2px 0 red, 2px 0 blue; }
      100% { transform: translate(0); }
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at center, #004b5c 0%, #000a0d 100%);
      animation: bloom-inverted 6s infinite alternate ease-in-out;
    }

    @keyframes bloom-inverted {
      0% { opacity: 0.8; }
      100% { opacity: 0.1; }
    }

    #okatan-entity {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 80px;
      height: 80px;
      background: var(--halo);
      margin: -40px;
      z-index: 5;
      animation: morph-rotate 12s infinite alternate ease-in-out, entity-shade 6s infinite alternate-reverse ease-in-out;
      box-shadow: 0 0 30px var(--halo);
      pointer-events: none;
      transition: 0.5s;
    }

    @keyframes entity-shade {
      0% { filter: brightness(1.8); }
      100% { filter: brightness(0.3); }
    }

    @keyframes morph-rotate {
      0% { border-radius: 50%; transform: rotate(0deg) scale(1); }
      50% { border-radius: 10%; transform: rotate(180deg) scale(1.15); }
      100% { border-radius: 50%; transform: rotate(360deg) scale(1); }
    }

    .talking #okatan-entity { animation: talking-pulse 0.2s infinite alternate !important; }

    @keyframes talking-pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.3); filter: brightness(2); }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      border-bottom: 2px solid var(--halo);
      background: rgba(0,0,0,0.9);
      z-index: 200;
      position: relative;
    }

    .pulse-core {
      width: 45px;
      height: 45px;
      position: absolute;
      left: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring {
      position: absolute;
      border: 1.5px solid var(--halo);
      border-radius: 50%;
      opacity: 0;
      animation: wave-out 3s infinite linear;
    }

    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }

    .talking .pulse-ring {
      animation-duration: 0.8s !important;
      border-width: 3px;
    }

    .pulse-orb {
      width: 18px;
      height: 18px;
      background: var(--halo);
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 15px var(--halo), inset 0 0 5px #fff;
      animation: core-breathe 2s infinite alternate ease-in-out;
    }

    .talking .pulse-orb { animation: talking-core 0.15s infinite alternate !important; }

    .listening .pulse-ring {
      animation-duration: 0.75s !important;
      border-width: 2px;
      opacity: 0.95;
      filter: drop-shadow(0 0 8px var(--halo));
    }

    .listening .pulse-orb {
      animation: listening-core 0.45s infinite alternate ease-in-out !important;
      box-shadow: 0 0 18px var(--halo), 0 0 32px var(--halo), inset 0 0 8px #fff;
    }

    .listening .mic-dot {
      animation: mic-wave 0.35s infinite alternate !important;
      width: 4px;
      border-radius: 2px;
      box-shadow: 0 0 6px var(--halo);
    }

    .listening .mic-dot:nth-child(1) { animation-delay: 0.05s !important; }
    .listening .mic-dot:nth-child(2) { animation-delay: 0.15s !important; }
    .listening .mic-dot:nth-child(3) { animation-delay: 0.25s !important; }

    @keyframes wave-out {
      0% { width: 10px; height: 10px; opacity: 0.8; }
      100% { width: 50px; height: 50px; opacity: 0; }
    }

    @keyframes core-breathe {
      0% { transform: scale(0.9); filter: brightness(0.8); }
      100% { transform: scale(1.1); filter: brightness(1.4); }
    }

    @keyframes talking-core {
      0% { transform: scale(1.2); filter: brightness(2); }
      100% { transform: scale(0.8); filter: brightness(1); }
    }

    @keyframes listening-core {
      0% { transform: scale(0.92); filter: brightness(1.1); }
      100% { transform: scale(1.24); filter: brightness(1.9); }
    }

    .title-box { text-align: center; cursor: pointer; user-select: none; }
    .title-box h1 { margin: 0; font-size: 24px; letter-spacing: 6px; }

    #bridge-stats {
      position: absolute;
      right: 15px;
      top: 12px;
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
    }

    #clock { font-size: 11px; letter-spacing: 1px; }
    #weather { font-size: 8px; opacity: 0.7; letter-spacing: 0.5px; white-space: nowrap; }

    #menu {
      position: absolute;
      inset: 0;
      background: rgba(0,10,13,0.98);
      z-index: 300;
      display: none;
      padding: 70px 20px 20px;
      overflow-y: auto;
    }

    .log-row {
      display: flex;
      margin-bottom: 8px;
      border: 1px solid var(--halo);
      background: rgba(0,0,0,0.5);
    }

    .log-id {
      width: 50px;
      background: var(--halo);
      color: #000;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .log-name {
      flex: 1;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .wipe-btn {
      background: #ff3e3e;
      color: #fff;
      border: none;
      padding: 0 15px;
      cursor: pointer;
    }

    #visor {
      height: calc(100dvh - 180px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      position: relative;
    }

    .msg {
      padding: 12px;
      border: 1px solid var(--halo);
      background: rgba(0, 20, 30, 0.85);
      max-width: 85%;
      font-size: 14px;
      border-radius: 5px;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .bot { align-self: flex-start; border-left: 4px solid var(--halo); }
    .user {
      align-self: flex-end;
      border-right: 4px solid #fff;
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .media-shell {
      position: fixed;
      inset: 74px 10px 88px 10px;
      z-index: 180;
      display: none;
      flex-direction: column;
      border: 1px solid var(--halo);
      background: rgba(0, 10, 13, 0.97);
      box-shadow: 0 0 22px rgba(77, 242, 255, 0.18);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .media-shell.open {
      display: flex;
    }

    .media-shell.fullscreen-mode {
      inset: 0;
      z-index: 500;
      border: none;
    }

    .media-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(77,242,255,0.35);
      background: rgba(0, 0, 0, 0.65);
      flex-wrap: wrap;
    }

    .media-status {
      font-size: 12px;
      letter-spacing: 1px;
      color: #fff;
      flex: 1;
      min-width: 180px;
    }

    .media-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .media-btn {
      background: transparent;
      color: var(--halo);
      border: 1px solid var(--halo);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .media-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .media-frame-wrap {
      position: relative;
      width: 100%;
      min-height: 280px;
      border: 1px solid rgba(77,242,255,0.35);
      background: rgba(0,0,0,0.35);
    }

    .media-frame {
      width: 100%;
      min-height: 58dvh;
      border: none;
      background: #000;
    }

    .media-card {
      border: 1px solid rgba(77,242,255,0.35);
      background: rgba(0,0,0,0.3);
      padding: 12px;
      line-height: 1.45;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .media-result {
      border: 1px solid rgba(77,242,255,0.35);
      background: rgba(0,0,0,0.28);
      padding: 10px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .media-result:hover {
      transform: translateY(-2px);
      border-color: var(--halo);
      box-shadow: 0 0 12px rgba(77,242,255,0.18);
    }

    .media-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(77,242,255,0.2);
      background: rgba(255,255,255,0.04);
      margin-bottom: 8px;
    }

    .media-result-title {
      color: #fff;
      font-size: 13px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .media-result-meta {
      font-size: 11px;
      opacity: 0.8;
      line-height: 1.35;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 15px;
      display: flex;
      gap: 10px;
      background: #000;
      z-index: 110;
      border-top: 2px solid var(--halo);
      box-sizing: border-box;
    }

    #in {
      flex: 1;
      background: transparent;
      border: 1px solid var(--halo);
      padding: 12px;
      color: var(--halo);
      font-family: inherit;
      font-size: 16px;
      outline: none;
    }

    .strike-btn {
      background: var(--halo);
      color: #000;
      border: none;
      padding: 0 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .mic-btn {
      background: transparent;
      border: 1px solid var(--halo);
      color: var(--halo);
      padding: 0 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 50px;
    }

    .mic-dot {
      width: 5px;
      height: 5px;
      background: var(--halo);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .talking .mic-dot { border-radius: 2px; width: 3px; }
    .talking .mic-dot:nth-child(1) { animation: mic-wave 0.5s infinite 0.1s alternate; }
    .talking .mic-dot:nth-child(2) { animation: mic-wave 0.5s infinite 0.2s alternate; }
    .talking .mic-dot:nth-child(3) { animation: mic-wave 0.5s infinite 0.3s alternate; }

    @keyframes mic-wave {
      0% { height: 4px; }
      100% { height: 20px; }
    }

    .uplink-btn {
      background: var(--halo);
      color: #000;
      border: none;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }

    .system-card {
      border: 1px solid var(--halo);
      padding: 15px;
      background: rgba(0,255,100,0.05);
      margin-top: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    .system-folder {
      border: 1px solid var(--halo);
      margin-top: 12px;
      background: rgba(0,0,0,0.35);
    }

    .system-folder-header {
      padding: 12px 14px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 1px solid rgba(77,242,255,0.25);
      background: rgba(77,242,255,0.08);
      user-select: none;
    }

    .system-folder-body {
      display: none;
      padding: 12px;
    }

    .system-provider-row {
      border: 1px solid rgba(77,242,255,0.35);
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.25);
    }

    .system-provider-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    .system-provider-meta {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .system-btn-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .system-inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 700px) {
      .system-inline-grid {
        grid-template-columns: 1fr;
      }

      .media-shell {
        inset: 70px 6px 82px 6px;
      }

      .media-frame {
        min-height: 42dvh;
      }
    }
  </style>
</head>

<script type="module">
  import * as webllm from "https://esm.run/@mlc-ai/web-llm";

  window.heavyBrain = null;
  window.isSyncing = false;

  const OFFLINE_MODEL_ID = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

  window.syncHeavyBrain = async function() {
    if (window.isSyncing) return;
    if (window.heavyBrain) {
      addMsg("LOCAL CORE ALREADY MOUNTED.", "bot");
      refreshProviderSubLabel();
      return;
    }

    window.isSyncing = true;
    addMsg(`STAGING LOCAL CORE: ${OFFLINE_MODEL_ID}`, "bot");

    try {
      const inputEl = document.getElementById("in");

      const engine = await webllm.CreateMLCEngine(OFFLINE_MODEL_ID, {
        initProgressCallback: (p) => {
          const progress = Math.round((p?.progress ?? 0) * 100);
          inputEl.placeholder = `MOUNTING: ${progress}%`;
        }
      });

      window.heavyBrain = engine;
      addMsg("CORE STABILIZED. LOCAL LINK READY.", "bot");
      inputEl.placeholder = "Query the Domain...";
      refreshProviderSubLabel();

      if (typeof activeSlot !== "undefined" && activeSlot === 11) {
        renderSystemPanel();
      }
    } catch (err) {
      console.error(err);
      addMsg(`NEURAL FAILURE: ${err?.message || "VRAM limit, unsupported browser, or WebGPU disabled."}`, "bot");
      document.getElementById("in").placeholder = "Query the Domain...";
      refreshProviderSubLabel();
    } finally {
      window.isSyncing = false;
    }
  };

  window.purgeHeavyBrain = async function() {
    if (!confirm("DANGER: Disconnect Neural Link?")) return;

    try {
      if (window.heavyBrain?.unload) {
        await window.heavyBrain.unload();
      }
    } catch (err) {
      console.error(err);
    } finally {
      window.heavyBrain = null;
      addMsg("NEURAL WIPE COMPLETE.", "bot");
      refreshProviderSubLabel();

      if (typeof activeSlot !== "undefined" && activeSlot === 11) {
        renderSystemPanel();
      }
    }
  };
</script>

  function playTone(freq, type, duration, vol = 0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  const canvas = document.getElementById("orbit-canvas");
  const ctx = canvas.getContext("2d");

  function initOrbits() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    orbits = [];
    const count = minimalMode ? 3 : 8;

    for (let i = 0; i < count; i++) {
      orbits.push({
        angle: Math.random() * Math.PI * 2,
        radius: 70 + (Math.random() * 40),
        speed: minimalMode ? 0.004 + (Math.random() * 0.004) : 0.01 + (Math.random() * 0.015),
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height
      });
    }
  }

  function drawOrbits() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    orbits.forEach(o => {
      o.angle += o.speed;
      const tx = cx + Math.cos(o.angle) * o.radius;
      const ty = cy + Math.sin(o.angle) * o.radius;

      if (isPressing && !minimalMode) {
        o.x += (mouseX - o.x) * 0.15;
        o.y += (mouseY - o.y) * 0.15;
      } else {
        o.x += (tx - o.x) * 0.1;
        o.y += (ty - o.y) * 0.1;
      }

      const halo =
        getComputedStyle(document.body).getPropertyValue("--halo").trim() ||
        getComputedStyle(document.documentElement).getPropertyValue("--halo").trim();

      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(o.x, o.y, minimalMode ? 2.5 : 4, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(drawOrbits);
  }

  window.addEventListener("resize", initOrbits);
  initOrbits();
  drawOrbits();

      localStorage.setItem(OLLAMA_MODEL_STORE, enteredModel.trim());
      DEFAULT_MODELS.ollama = enteredModel.trim();
      return true;
    }

    if (!getCloudProviders().includes(providerInput)) {
      addMsg("INVALID PROVIDER.", "bot");
      return false;
    }

    selectedProvider = providerInput;
    sessionStorage.setItem(PROVIDER_KEY, selectedProvider);
    setBackend(providerInput);

    const existingKey = getProviderKey(selectedProvider);
    if (existingKey) {
      if (selectedProvider === "cloudflare" && !sessionStorage.getItem(CLOUDFLARE_ACCOUNT_ID_STORE)) {
        const accountId = prompt("ENTER CLOUDFLARE ACCOUNT ID:");
        if (!accountId || !accountId.trim()) {
          addMsg("CLOUDFLARE ACCOUNT ID NOT PROVIDED.", "bot");
          return false;
        }
        sessionStorage.setItem(CLOUDFLARE_ACCOUNT_ID_STORE, accountId.trim());
      }
      return true;
    }

    const enteredKey = prompt(`ENTER ${getProviderLabel(selectedProvider)} API KEY:`);

    if (!enteredKey || !enteredKey.trim()) {
      addMsg(`${getProviderLabel(selectedProvider)} KEY NOT PROVIDED.`, "bot");
      return false;
    }

    setProviderKey(selectedProvider, enteredKey.trim());

    if (selectedProvider === "cloudflare") {
      const accountId = prompt("ENTER CLOUDFLARE ACCOUNT ID:");
      if (!accountId || !accountId.trim()) {
        addMsg("CLOUDFLARE ACCOUNT ID NOT PROVIDED.", "bot");
        return false;
      }
      sessionStorage.setItem(CLOUDFLARE_ACCOUNT_ID_STORE, accountId.trim());
    }

    return true;
  }

      "map ", "route ", "search ", "bible ", "voice mode", "lock mode",

      "play ", "music ", "yt ", "youtube ", "watch ", "stop media", "stop video", "close media", "close video", "exit media", "exit video", "youtube history"

  }

  async function gatherIntel(rawQuery) {
    const cleanedQuery = normalizeGatherQuery(rawQuery);

    if (!cleanedQuery) {
      return "USE: gather me [topic]";
    }

    abortCurrentGather();

    const controller = new AbortController();
    currentGatherController = controller;
    currentGatherTimer = setTimeout(() => {
      try { controller.abort(); } catch (e) { console.error(e); }
    }, GATHER_TIMEOUT_MS);

    try {
      const ddgRes = await fetch(
        `https://api.duckduckgo.com/?q=${encodeURIComponent(cleanedQuery)}&format=json&no_html=1&skip_disambig=0&origin=*`,
        { signal: controller.signal }
      );
      const ddgData = await ddgRes.json();

      const ddgTitle =
        ddgData?.Heading ||
        ddgData?.AbstractSource ||
        ddgData?.RelatedTopics?.[0]?.Text?.split(" - ")[0] ||
        "";

      const ddgText =
        ddgData?.AbstractText ||
        ddgData?.RelatedTopics?.[0]?.Text ||
        ddgData?.Answer ||
        "";

      const ddgUrl =
        ddgData?.AbstractURL ||
        ddgData?.RelatedTopics?.[0]?.FirstURL ||
        "";

      if (ddgText) {
        clearGatherTimeout();
        currentGatherController = null;

        return `<b>GATHERED INTEL: ${(ddgTitle || cleanedQuery).toUpperCase()}</b><br><b>SOURCE: DUCKDUCKGO</b><br>${ddgText}${
          ddgUrl
            ? `<br><br><button class="uplink-btn" onclick="window.open('${ddgUrl}', '_blank')">[ OPEN SOURCE ]</button>`
            : ""
        }`;
      }

      const searchRes = await fetch(
        `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(cleanedQuery)}&limit=1&namespace=0&format=json&origin=*`,
        { signal: controller.signal }
      );
      const searchData = await searchRes.json();

      const bestTitle = searchData?.[1]?.[0];
      if (bestTitle) {
        const summaryRes = await fetch(
          `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestTitle)}`,
          { signal: controller.signal }
        );
        const summaryData = await summaryRes.json();

        const title = summaryData?.title || bestTitle;
        const extract = summaryData?.extract || "NO SUMMARY AVAILABLE.";
        const pageUrl = summaryData?.content_urls?.desktop?.page || "";

        clearGatherTimeout();
        currentGatherController = null;

        return `<b>GATHERED INTEL: ${title.toUpperCase()}</b><br><b>SOURCE: WIKIPEDIA</b><br>${extract}${
          pageUrl
            ? `<br><br><button class="uplink-btn" onclick="window.open('${pageUrl}', '_blank')">[ OPEN SOURCE ]</button>`
            : ""
        }`;
      }

      clearGatherTimeout();
      currentGatherController = null;

      return `<b>GATHER FAILED.</b><br><b>SOURCE: SEARCH UPLINK</b><br>NO CLEAN LIVE SUMMARY FOUND FOR: ${cleanedQuery.toUpperCase()}<br><br><button class="uplink-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(cleanedQuery)}', '_blank')">[ ACCESS SEARCH UPLINK ]</button>`;
    } catch (e) {
      const aborted = e?.name === "AbortError";

      clearGatherTimeout();
      currentGatherController = null;

      if (aborted) {
        return `<b>GATHER TIMED OUT OR WAS ABORTED.</b><br><b>SOURCE: SEARCH UPLINK</b><br>FALLING BACK TO DIRECT SEARCH FOR: ${cleanedQuery.toUpperCase()}<br><br><button class="uplink-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(cleanedQuery)}', '_blank')">[ ACCESS SEARCH UPLINK ]</button>`;
      }

      console.error(e);
      return `<b>GATHER LINK FAILED.</b><br><b>SOURCE: SEARCH UPLINK</b><br><button class="uplink-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(cleanedQuery)}', '_blank')">[ ACCESS SEARCH UPLINK ]</button>`;
    }
  }

  async function reverseGeocodeLabel(lat, lon) {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&language=en&format=json`
      );
      const data = await res.json();
      const place = data?.results?.[0];
      return (place?.city || place?.town || place?.village || place?.name || "LOCAL").toUpperCase();
    } catch {
      return "LOCAL";
    }
  }

  async function fetchWeatherForCoords(lat, lon, fallbackLabel = "LOCAL") {
    const weatherEl = document.getElementById("weather");

    try {
      const [weatherRes, label] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&current_weather=true`),
        reverseGeocodeLabel(lat, lon)
      ]);

      const weatherData = await weatherRes.json();
      const temp = weatherData?.current_weather?.temperature;

      if (typeof temp === "number") {
        weatherEl.innerText = `${label || fallbackLabel}: ${Math.round(temp)}°C`;
      } else {
        weatherEl.innerText = `${fallbackLabel}: --°C`;
      }
    } catch {
      weatherEl.innerText = "WEATHER OFFLINE";
    }
  }

  function fetchWeather() {
    const weatherEl = document.getElementById("weather");

    if (isOffline) {
      weatherEl.innerText = "OFFLINE";
      return;
    }

    if (!navigator.geolocation) {
      fetchWeatherForCoords(52.31, -114.10, "SYLVAN LAKE");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        fetchWeatherForCoords(pos.coords.latitude, pos.coords.longitude, "LOCAL");
      },
      () => {
        fetchWeatherForCoords(52.31, -114.10, "SYLVAN LAKE");
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 600000 }
    );
  }

    if (countdownRunning) return "COUNTDOWN ALREADY RUNNING.";

    countdownRunning = true;
    countdownEnd = Date.now() + (seconds * 1000);

    countdownInterval = setInterval(() => {
      const remaining = countdownEnd - Date.now();
      if (remaining <= 0) {
        clearInterval(countdownInterval);

        countdownRunning = false;

  function parseCountdownInput(raw) {
    const input = raw.trim().toLowerCase();

    if (/^\d+$/.test(input)) return parseInt(input, 10);

    const minMatch = input.match(/^(\d+)\s*(m|min|mins|minute|minutes)$/);
    if (minMatch) return parseInt(minMatch[1], 10) * 60;

    const secMatch = input.match(/^(\d+)\s*(s|sec|secs|second|seconds)$/);
    if (secMatch) return parseInt(secMatch[1], 10);

    const clockMatch = input.match(/^(\d+):(\d{1,2})$/);
    if (clockMatch) return parseInt(clockMatch[1], 10) * 60 + parseInt(clockMatch[2], 10);

    return NaN;
  }

    const now = new Date();
    const target = new Date();
    target.setHours(hh, mm, 0, 0);
    if (target <= now) target.setDate(target.getDate() + 1);

    const diffMs = target.getTime() - now.getTime();
    saveAlarmData({ target: target.getTime() });
    alarmTimeout = setTimeout(triggerAlarm, diffMs);

  async function flashlightOn() {
    try {
      if (!navigator.mediaDevices?.getUserMedia) return "FLASHLIGHT UNAVAILABLE.";
      if (flashlightTrack) return "FLASHLIGHT ALREADY ON.";

      flashlightStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
      });

      flashlightTrack = flashlightStream.getVideoTracks()[0];
      const capabilities = flashlightTrack.getCapabilities?.();

      if (!capabilities || !capabilities.torch) {
        flashlightStream.getTracks().forEach(t => t.stop());
        flashlightStream = null;
        flashlightTrack = null;
        return "FLASHLIGHT NOT SUPPORTED ON THIS DEVICE/BROWSER.";
      }

      await flashlightTrack.applyConstraints({ advanced: [{ torch: true }] });
      return "FLASHLIGHT ON.";
    } catch (e) {
      console.error(e);
      flashlightStream?.getTracks?.().forEach(t => t.stop());
      flashlightStream = null;
      flashlightTrack = null;
      return "FLASHLIGHT FAILED.";
    }
  }

  async function flashlightOff() {
    try {
      if (!flashlightTrack) return "FLASHLIGHT NOT ACTIVE.";
      const capabilities = flashlightTrack.getCapabilities?.();
      if (capabilities?.torch) {
        await flashlightTrack.applyConstraints({ advanced: [{ torch: false }] });
      }
      flashlightStream?.getTracks?.().forEach(t => t.stop());
      flashlightStream = null;
      flashlightTrack = null;
      return "FLASHLIGHT OFF.";
    } catch (e) {
      console.error(e);
      flashlightStream?.getTracks?.().forEach(t => t.stop());
      flashlightStream = null;
      flashlightTrack = null;
      return "FLASHLIGHT SHUTDOWN FAILED.";
    }
  }

  function directionFromHeading(heading) {
    const dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
    const idx = Math.round(heading / 45) % 8;
    return dirs[idx];
  }

  function onCompassOrientation(event) {
    let heading = null;

    if (typeof event.webkitCompassHeading === "number") {
      heading = event.webkitCompassHeading;
    } else if (typeof event.alpha === "number") {
      heading = 360 - event.alpha;
    }

    if (typeof heading === "number" && !Number.isNaN(heading)) {
      compassHeading = ((heading % 360) + 360) % 360;
    }
  }

  function attachCompassListener() {
    if (orientationHandlerAttached) return;
    window.addEventListener("deviceorientation", onCompassOrientation, true);
    orientationHandlerAttached = true;
  }

  async function ensureCompassReady() {
    if (!window.DeviceOrientationEvent) {
      return "COMPASS NOT SUPPORTED ON THIS DEVICE/BROWSER.";
    }

    if (!compassInitialized) {
      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            return "COMPASS PERMISSION DENIED.";
          }
        } catch (e) {
          console.error(e);
          return "COMPASS PERMISSION FAILED.";
        }
      }

      attachCompassListener();
      compassInitialized = true;
    }

    return null;
  }

  async function getCompassReading() {
    const error = await ensureCompassReady();
    if (error) return error;

    return new Promise((resolve) => {
      setTimeout(() => {
        if (typeof compassHeading !== "number") {
          resolve("COMPASS UNAVAILABLE OR NO SENSOR DATA.");
          return;
        }

        const rounded = Math.round(compassHeading);
        resolve(`COMPASS:<br>HEADING: ${rounded}°<br>DIRECTION: ${directionFromHeading(rounded)}`);
      }, 600);
    });
  }

  function normalizeInterruptPhrase(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[^\w\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isStopCommand(text) {
    const heard = normalizeInterruptPhrase(text);
    return (
      heard === "stop" ||
      heard === "halt" ||
      heard === "stand fast" ||
      heard === "hey katana stop" ||
      heard === "hey okatan stop" ||
      heard === "stop media" ||
      heard === "stop video"
    );
  }

  function isWakeInterrupt(text) {
    const heard = normalizeInterruptPhrase(text);
    return (
      heard.startsWith("hey katana") ||
      heard.startsWith("hey okatan") ||
      heard === "katana" ||
      heard === "okatan"
    );
  }

  function stripWakePhrase(text) {
    return String(text || "")
      .replace(/^\s*hey\s+katana[\s,.:;-]*/i, "")
      .replace(/^\s*hey\s+okatan[\s,.:;-]*/i, "")
      .replace(/^\s*katana[\s,.:;-]*/i, "")
      .replace(/^\s*okatan[\s,.:;-]*/i, "")

  function buildYoutubeEmbedUrl(videoId, autoplay = true) {
    const params = new URLSearchParams({
      autoplay: autoplay ? "1" : "0",
      rel: "0",
      modestbranding: "1",
      playsinline: "1"
    });
    return `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
  }

  function extractYouTubeVideoId(input) {
    const raw = String(input || "").trim();
    if (!raw) return "";

    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) {
      return raw;
    }

    try {
      const url = new URL(raw);

      if (url.hostname.includes("youtu.be")) {
        const id = url.pathname.replace(/^\/+/, "").split("/")[0];
        return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : "";
      }

      if (url.hostname.includes("youtube.com")) {
        const v = url.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) {
          return v;
        }

        const parts = url.pathname.split("/").filter(Boolean);

        const embedIndex = parts.indexOf("embed");
        if (embedIndex !== -1 && parts[embedIndex + 1]) {
          const id = parts[embedIndex + 1];
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : "";
        }

        const shortsIndex = parts.indexOf("shorts");
        if (shortsIndex !== -1 && parts[shortsIndex + 1]) {
          const id = parts[shortsIndex + 1];
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : "";
        }

        const liveIndex = parts.indexOf("live");
        if (liveIndex !== -1 && parts[liveIndex + 1]) {
          const id = parts[liveIndex + 1];
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : "";
        }
      }
    } catch (e) {
      console.error(e);
    }

    return "";
  }

  function buildYoutubeSearchUrl(query) {
    return `https://www.youtube.com/results?search_query=${encodeURIComponent(String(query || "").trim())}`;
  }

  function escapeAttr(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function escapeInlineJS(str) {
    return String(str || "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'");
  }

  async function searchYouTube(query, mode = "video") {
    const cleanQuery = String(query || "").trim();
    if (!cleanQuery) return [];

    const apiKey = getYouTubeApiKey();
    mediaState.apiEnabled = !!apiKey;

    if (apiKey) {
      try {
        const finalQuery = mode === "music" ? `${cleanQuery} music audio` : cleanQuery;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q=${encodeURIComponent(finalQuery)}&key=${encodeURIComponent(apiKey)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (response.ok && Array.isArray(data.items)) {
          return data.items
            .map(item => ({
              videoId: item?.id?.videoId,
              title: item?.snippet?.title || "UNTITLED",
              channel: item?.snippet?.channelTitle || "UNKNOWN CHANNEL",
              meta: item?.snippet?.publishedAt ? new Date(item.snippet.publishedAt).toLocaleDateString() : "",
              thumb: item?.snippet?.thumbnails?.medium?.url || item?.snippet?.thumbnails?.default?.url || ""
            }))
            .filter(item => item.videoId);
        }
      } catch (e) {
        console.error(e);
      }
    }

    return [];
  }

  async function openMediaByQuery(query, mode = "video") {
    const cleanQuery = String(query || "").trim();
    if (!cleanQuery) {
      addMsg("MEDIA QUERY EMPTY.", "bot");
      return;
    }

    mediaState.query = cleanQuery;
    mediaState.mode = mode;
    openMediaShell();
    setMediaStatus(`SEARCHING: ${cleanQuery.toUpperCase()}`);

    const directVideoId = extractYouTubeVideoId(cleanQuery);

    if (directVideoId) {
      openMediaByVideoId(directVideoId, cleanQuery, mode);
      return;
    }

    const apiKey = getYouTubeApiKey();
    mediaState.apiEnabled = !!apiKey;

    if (!apiKey) {
      renderNoApiMediaSearch(cleanQuery, mode);
      addMsg(`MEDIA SEARCH OPENED: ${cleanQuery.toUpperCase()}`, "bot");
      talk(`Opening ${mode === "music" ? "music" : "video"} search.`);
      return;
    }

    const results = await searchYouTube(cleanQuery, mode);

    if (!results.length) {
      renderNoApiMediaSearch(cleanQuery, mode);
      addMsg(`NO API RESULTS. OPENING SEARCH UPLINK: ${cleanQuery.toUpperCase()}`, "bot");
      talk("No direct results. Opening search uplink.");
      return;
    }

    renderMediaResults(results, mode);
    addMsg(`MEDIA RESULTS READY: ${cleanQuery.toUpperCase()}`, "bot");
    talk("Media results ready.");
  }

  function openMediaByVideoId(videoId, title = "", mode = "video") {
    const raw = String(videoId || "").trim();
    if (!raw) {
      addMsg("INVALID VIDEO TARGET.", "bot");
      return;
    }

    const cleanId = extractYouTubeVideoId(raw) || (/^[a-zA-Z0-9_-]{11}$/.test(raw) ? raw : "");

    if (!cleanId) {
      openMediaByQuery(raw, mode);
      return;
    }

    mediaState.query = mediaState.query || title || "";
    mediaState.mode = mode;
    renderMediaFrame(cleanId, title || "YOUTUBE TARGET", mode);
    pushYoutubeHistory({
      videoId: cleanId,
      title: title || "YOUTUBE TARGET",
      mode,
      query: mediaState.query || title || ""
    });
    addMsg(`MEDIA LINKED: ${(title || "YOUTUBE TARGET").toUpperCase()}`, "bot");
    talk(`Opening ${title || "media target"}.`);
  }

        (pos) => {
          resolve(`COORDINATES:<br>LAT: ${pos.coords.latitude.toFixed(6)}<br>LON: ${pos.coords.longitude.toFixed(6)}<br>ACC: ${Math.round(pos.coords.accuracy)}m`);

        () => resolve("COORDINATE LOCK FAILED."),
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
      );
    });
  }

  async function offlineCommand(raw) {

      return "BRAIN COPY ATTEMPTED.";

    if (low === "help" || low === "offline help" || low === "capabilities" || low === "modes") {
      return getOnlineOfflineCapabilities();
    }

    if (low === "status") return getStatusSummary();
    if (low === "device") return getDeviceOnlySummary();
    if (low === "screen") return getScreenSummary();
    if (low === "system") return getSystemSummary();
    if (low === "date") return `DATE: <b>${new Date().toLocaleDateString()}</b>`;
    if (low === "time") return `TIME: <b>${new Date().toLocaleTimeString()}</b>`;
    if (low === "session") return getSessionSummary();
    if (low === "archives") return getArchiveSummary();
    if (low === "battery") return await getBatteryStatus();
    if (low === "coords" || low === "coordinates") return await getCoords();
    if (low === "compass") return await getCompassReading();

    if (low.startsWith("note ")) {
      const note = val.slice(5).trim();
      if (!note) return "EMPTY NOTE.";
      const notes = getNotes();
      notes.push(note);
      saveNotes(notes);
      return "NOTE STORED.";
    }

    if (low === "notes") return formatList(getNotes(), "STORED NOTES");

    if (low === "clear notes") {
      saveNotes([]);
      return "NOTES PURGED.";
    }

    if (low.startsWith("remember ")) return addMemory(val.slice(9));
    if (low === "recall" || low === "memory") return getMemorySummary();

    if (low.startsWith("forget ")) {
      const arg = low.slice(7).trim();
      if (arg === "all") return forgetAllMemory();
      const idx = parseInt(arg, 10) - 1;
      if (!Number.isFinite(idx)) return "USE: forget 1 OR forget all";
      return forgetMemory(idx);
    }

    if (low === "forget all") return forgetAllMemory();

    if (low.startsWith("task add ")) return addTask(val.slice(9));
    if (low === "task list" || low === "tasks") return getTaskList();
    if (low.startsWith("task done ")) {
      const idx = parseInt(val.slice(10).trim(), 10) - 1;
      return completeTask(idx);
    }
    if (low === "task clear" || low === "clear tasks") return clearTasks();

    if (low.startsWith("check add ")) return addChecklistItem(val.slice(10));
    if (low === "check list" || low === "checklist") return getChecklistSummary();
    if (low.startsWith("check done ")) {
      const idx = parseInt(val.slice(11).trim(), 10) - 1;
      if (!Number.isFinite(idx)) return "USE: check done 1";
      return completeChecklistItem(idx);
    }
    if (low === "check clear" || low === "clear checklist") return clearChecklist();

    if (low === "flip coin") return flipCoin();

    if (low === "roll die" || low === "roll dice") return rollDie(6);
    if (low.startsWith("roll d")) {
      const sides = parseInt(low.slice(6), 10);
      return rollDie(sides);
    }

    if (low === "choose letter") return chooseLetter();
    if (low.startsWith("choose letter ")) {
      const parts = low.split(/\s+/);
      if (parts.length === 4) return chooseLetterRange(parts[2], parts[3]);
      return chooseLetter();
    }

    if (low.startsWith("choose number ")) {
      const parts = low.split(/\s+/);
      if (parts.length >= 4) {
        const min = parseInt(parts[2], 10);
        const max = parseInt(parts[3], 10);
        return chooseNumberBetween(min, max);
      }
      return "USE: choose number 1 50";
    }

    if (low.startsWith("choose a number between ")) {
      const match = low.match(/^choose a number between\s+(-?\d+)\s+and\s+(-?\d+)$/);
      if (match) {
        return chooseNumberBetween(parseInt(match[1], 10), parseInt(match[2], 10));
      }
      return "USE: choose a number between 1 and 50";
    }

    if (low === "stopwatch start") return startStopwatch();
    if (low === "stopwatch stop") return stopStopwatch();
    if (low === "stopwatch reset") return resetStopwatch();
    if (low === "stopwatch status") return stopwatchStatus();

    if (low === "countdown stop") return stopCountdown();
    if (low === "countdown status") return countdownStatus();
    if (low.startsWith("countdown ")) {
      const seconds = parseCountdownInput(val.slice(10));
      if (!Number.isFinite(seconds)) return "USE: countdown 5m OR countdown 300 OR countdown 05:00";
      return startCountdown(seconds);
    }

    if (low === "alarm stop") return stopAlarm();
    if (low === "alarm status") return getAlarmStatus();
    if (low.startsWith("alarm ")) {
      const alarmVal = val.slice(6).trim().toLowerCase();

      const timeMatch = alarmVal.match(/^(\d{1,2}):(\d{2})$/);
      if (timeMatch) return setAlarmAt(timeMatch[1], timeMatch[2]);

      const seconds = parseCountdownInput(alarmVal);
      if (Number.isFinite(seconds)) return setAlarmFromNow(seconds);

      return "USE: alarm 5m OR alarm 07:30";
    }

    if (low === "reminders") return getRemindersSummary();
    if (low === "clear reminders") return clearReminders();

    if (low.startsWith("remind me in ")) {
      const m = val.match(/^remind me in\s+(.+?)\s+(.+)$/i);
      if (!m) return "USE: remind me in 15m take laundry out";
      const seconds = parseCountdownInput(m[1]);
      if (!Number.isFinite(seconds)) return "INVALID REMINDER TIME.";
      return setReminderIn(seconds, m[2]);
    }

    if (low.startsWith("remind me at ")) {
      const m = val.match(/^remind me at\s+(\d{1,2}):(\d{2})\s+(.+)$/i);
      if (!m) return "USE: remind me at 19:30 call mom";
      return setReminderAt(m[1], m[2], m[3]);
    }

    if (low === "flashlight on") return await flashlightOn();
    if (low === "flashlight off") return await flashlightOff();

    if (low === "minimal on") {
      applyMinimalMode(true);
      return "MINIMAL MODE ON.";
    }

    if (low === "minimal off") {
      applyMinimalMode(false);
      return "MINIMAL MODE OFF.";
    }

    if (low === "youtube history") {
      const history = getYoutubeHistory();
      if (!history.length) return "YOUTUBE HISTORY: EMPTY.";
      return `<b>YOUTUBE HISTORY</b><br>` + history.map((item, idx) => {
        const safeTitle = String(item.title || "UNTITLED").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const safeMode = String(item.mode || "video").toUpperCase();
        const safeId = String(item.videoId || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
        return `${idx + 1}. ${safeTitle} [${safeMode}]<br><button class="uplink-btn" onclick="openMediaByVideoId('${safeId}','${safeTitle.replace(/\\/g, "\\\\").replace(/'/g, "\\'")}','${item.mode || "video"}')">REOPEN</button>`;
      }).join("<br>");
    }

    if (low.startsWith("play ")) {
      if (isOffline) return offlineBlocked("media");
      await openMediaByQuery(val.slice(5).trim(), "video");
      return "";
    }

    if (low.startsWith("music ")) {
      if (isOffline) return offlineBlocked("media");
      await openMediaByQuery(val.slice(6).trim(), "music");
      return "";
    }

    if (low.startsWith("yt ")) {
      if (isOffline) return offlineBlocked("media");
      await openMediaByQuery(val.slice(3).trim(), "video");
      return "";
    }

    if (low.startsWith("youtube ")) {
      if (isOffline) return offlineBlocked("media");
      await openMediaByQuery(val.slice(8).trim(), "video");
      return "";
    }

    if (low.startsWith("watch ")) {
      if (isOffline) return offlineBlocked("media");
      await openMediaByQuery(val.slice(6).trim(), "video");
      return "";
    }

    if (low === "stop media" || low === "stop video") {
      stopMedia(true);
      return "";
    }

    if (
      low === "close media" ||
      low === "close video" ||
      low === "exit media" ||
      low === "exit video"
    ) {
      closeMedia(true);
      return "";
    }

    if (/^[0-9+\-*/().\s×÷]+$/.test(val) && /[+\-*/×÷]/.test(val)) {
      try {
        return `RESULT: <b>${Function(`"use strict"; return (${val.replace(/×/g, "*").replace(/÷/g, "/")})`)()}</b>`;
      } catch {
        return "CALC ERROR.";
      }
    }

    if (low.startsWith("calc ")) {
      const expr = val.slice(5).trim().replace(/×/g, "*").replace(/÷/g, "/");
      if (!/^[0-9+\-*/().\s]+$/.test(expr)) return "INVALID CALC INPUT.";
      try {
        return `RESULT: <b>${Function(`"use strict"; return (${expr})`)()}</b>`;
      } catch {
        return "CALC ERROR.";
      }
    }

    return "OFFLINE MODE ACTIVE. USE 'capabilities' TO VIEW ONLINE/OFFLINE COMMANDS.";
  }

  function splitSpeechChunks(text, maxLen = 180) {
    const cleaned = String(text || "")
      .replace(/<[^>]*>/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    if (!cleaned) return [];

    const sentences = cleaned.match(/[^.!?]+[.!?]*|.+$/g) || [cleaned];
    const chunks = [];
    let buffer = "";

    for (const sentence of sentences) {
      const s = sentence.trim();
      if (!s) continue;

      if ((buffer + " " + s).trim().length <= maxLen) {
        buffer = (buffer + " " + s).trim();
      } else {
        if (buffer) chunks.push(buffer);

        if (s.length <= maxLen) {
          buffer = s;
        } else {
          const words = s.split(" ");
          let sub = "";

          for (const word of words) {
            if ((sub + " " + word).trim().length <= maxLen) {
              sub = (sub + " " + word).trim();
            } else {
              if (sub) chunks.push(sub);
              sub = word;
            }
          }

          buffer = sub;
        }
      }
    }

    if (buffer) chunks.push(buffer);
    return chunks;
  }

  function speakNextChunk() {
    if (speechStopRequested) {
      speakingNow = false;
      currentUtterance = null;
      document.body.classList.remove("talking");
      stopInterruptListener();
      setListeningVisual(false);
      scheduleVoiceRelisten();
      return;
    }

    if (!speechQueue.length) {
      speakingNow = false;
      currentUtterance = null;
      document.body.classList.remove("talking");
      stopInterruptListener();
      setListeningVisual(false);
      scheduleVoiceRelisten();
      return;
    }

    const chunk = speechQueue.shift();
    const utter = new SpeechSynthesisUtterance(chunk);
    currentUtterance = utter;

    utter.pitch = 0.8;
    utter.rate = 1.0;

    utter.onstart = () => {
      document.body.classList.add("talking");
      setListeningVisual(false);
      startInterruptListener();
    };

    utter.onend = () => {
      currentUtterance = null;
      setTimeout(() => {
        speakNextChunk();
      }, 60);
    };

    utter.onerror = (e) => {
      console.error(e);
      currentUtterance = null;
      setTimeout(() => {
        speakNextChunk();
      }, 60);
    };

    try {
      window.speechSynthesis.speak(utter);
    } catch (e) {
      console.error(e);
      speakingNow = false;
      currentUtterance = null;
      document.body.classList.remove("talking");
      stopInterruptListener();
      setListeningVisual(false);
      scheduleVoiceRelisten();
    }
  }

  function talk(txt) {
    const cleaned = String(txt || "")
      .replace(/<[^>]*>/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    if (!cleaned) return;

    speechStopRequested = false;
    speechQueue = splitSpeechChunks(cleaned, 180);

    try {
      window.speechSynthesis.cancel();
    } catch (e) {
      console.error(e);
    }

    document.body.classList.remove("talking");
    stopInterruptListener();
    setListeningVisual(false);

    speakingNow = true;
    speakNextChunk();
  }

          sessionStorage.setItem(CLOUDFLARE_ACCOUNT_ID_STORE, accountId.trim());
        } else {
          const enteredKey = prompt(`ENTER ${getProviderLabel(selectedProvider)} API KEY:`);
          if (!enteredKey || !enteredKey.trim()) {
            res = `${getProviderLabel(selectedProvider)} KEY NOT PROVIDED.`;
            addMsg(res, "bot");
            talk(res);
            return;
          }
          setProviderKey(selectedProvider, enteredKey.trim());
        }
      }

      refreshProviderSubLabel();
      res = `AI PROVIDER SET: ${getProviderLabel(selectedProvider)}`;
      addMsg(res, "bot");
      talk(res);
      return;
    }

    if (low === "switch provider") {
      promptSwitchProvider();
      return;
    }

    if (low === "provider" || low === "ai provider") {
      res = `BACKEND: ${getProviderLabel(backendMode)}${
        backendMode !== "web" ? `<br>ACTIVE PROVIDER: ${selectedProvider ? getProviderLabel(selectedProvider) : "NONE"}` : ""
      }`;
      addMsg(res, "bot");
      talk(`Backend ${getProviderLabel(backendMode)}.`);
      return;
    }

    if (low === "clear current key") {
      if (backendMode === "web") {
        res = "WEBLLM HAS NO API KEY TO CLEAR.";
      } else if (backendMode === "ollama") {
        res = "OLLAMA HAS NO API KEY TO CLEAR.";
      } else if (!selectedProvider) {
        res = "NO ACTIVE PROVIDER.";
      } else {
        clearProviderKey(selectedProvider);
        if (normalizeProviderName(selectedProvider) === "cloudflare") {
          sessionStorage.removeItem(CLOUDFLARE_ACCOUNT_ID_STORE);
        }
        refreshProviderSubLabel();
        res = `${getProviderLabel(selectedProvider)} KEY CLEARED.`;
      }
      addMsg(res, "bot");
      talk(stripHTML(res));
      return;
    }

    if (low === "clear api" || low === "clear current api") {
      if (backendMode === "web") {
        res = "WEBLLM HAS NO API KEY TO CLEAR.";
      } else if (backendMode === "ollama") {
        res = "OLLAMA HAS NO API KEY TO CLEAR.";
      } else if (!selectedProvider) {
        res = "NO ACTIVE PROVIDER.";
      } else {
        clearProviderKey(selectedProvider);
        if (normalizeProviderName(selectedProvider) === "cloudflare") {
          sessionStorage.removeItem(CLOUDFLARE_ACCOUNT_ID_STORE);
        }
        refreshProviderSubLabel();
        res = `${getProviderLabel(selectedProvider)} KEY CLEARED.`;
      }
      addMsg(res, "bot");
      talk(stripHTML(res));
      return;
    }

    if (low === "clear api all" || low === "clear all keys" || low === "clear all api keys") {
      clearAllProviderKeys();
      sessionStorage.removeItem(CLOUDFLARE_ACCOUNT_ID_STORE);
      clearYouTubeApiKey();
      refreshProviderSubLabel();
      res = "ALL PROVIDER KEYS CLEARED.";
      addMsg(res, "bot");
      talk(res);
      return;
    }

    {
      const setKeyMatch = low.match(/^set\s+(groq|gemini|xai|grok|openai|anthropic|claude|openrouter|deepinfra|together|fireworks|cloudflare|ollama|youtube)\s+key$/);
      if (setKeyMatch) {
        const provider = normalizeProviderName(setKeyMatch[1]);

        if (provider === "youtube") {
          const ok = setYouTubeApiKey();
          res = ok ? "YOUTUBE KEY STORED." : "YOUTUBE KEY NOT PROVIDED.";
          addMsg(res, "bot");
          talk(res);
          if (activeSlot === 11) renderSystemPanel();
          return;
        }

        if (provider === "ollama") {
          const enteredModel = prompt("ENTER OLLAMA MODEL NAME:", getProviderModel("ollama"));
          if (!enteredModel || !enteredModel.trim()) {
            res = "OLLAMA MODEL NOT PROVIDED.";
          } else {
            localStorage.setItem(OLLAMA_MODEL_STORE, enteredModel.trim());
            DEFAULT_MODELS.ollama = enteredModel.trim();
            selectedProvider = provider;
            sessionStorage.setItem(PROVIDER_KEY, selectedProvider);
            setBackend(provider);
            refreshProviderSubLabel();
            res = `OLLAMA MODEL SET: ${enteredModel.trim()}`;
          }
          addMsg(res, "bot");
          talk(res);
          return;
        }

        const enteredKey = prompt(`ENTER ${getProviderLabel(provider)} API KEY:`, getProviderKey(provider) || "");
        if (!enteredKey || !enteredKey.trim()) {
          res = `${getProviderLabel(provider)} KEY NOT PROVIDED.`;
        } else {
          setProviderKey(provider, enteredKey.trim());

          if (provider === "cloudflare") {
            const accountId = prompt("ENTER CLOUDFLARE ACCOUNT ID:", sessionStorage.getItem(CLOUDFLARE_ACCOUNT_ID_STORE) || "");
            if (!accountId || !accountId.trim()) {
              res = "CLOUDFLARE ACCOUNT ID NOT PROVIDED.";
              addMsg(res, "bot");
              talk(res);
              return;
            }
            sessionStorage.setItem(CLOUDFLARE_ACCOUNT_ID_STORE, accountId.trim());
          }

          selectedProvider = provider;
          sessionStorage.setItem(PROVIDER_KEY, selectedProvider);
          setBackend(provider);
          refreshProviderSubLabel();
          res = `${getProviderLabel(provider)} KEY STORED.`;
        }
        addMsg(res, "bot");
        talk(res);
        return;
      }
    }

    {
      const clearKeyMatch = low.match(/^clear\s+(groq|gemini|xai|grok|openai|anthropic|claude|openrouter|deepinfra|together|fireworks|cloudflare|youtube)\s+key$/);
      if (clearKeyMatch) {
        const provider = normalizeProviderName(clearKeyMatch[1]);

        if (provider === "youtube") {
          clearYouTubeApiKey();
          if (activeSlot === 11) renderSystemPanel();
          res = "YOUTUBE KEY CLEARED.";
          addMsg(res, "bot");
          talk(res);
          return;
        }

        clearProviderKey(provider);
        if (provider === "cloudflare") {
          sessionStorage.removeItem(CLOUDFLARE_ACCOUNT_ID_STORE);
        }
        refreshProviderSubLabel();
        res = `${getProviderLabel(provider)} KEY CLEARED.`;
        addMsg(res, "bot");
        talk(res);
        return;
      }
    }

    if (low === "youtube history") {
      openYoutubeHistoryPanel();
      return;
    }

    if (low.startsWith("yt ")) {
      if (isOffline) {
        res = offlineBlocked("media");
      } else {
        await openMediaByQuery(val.slice(3).trim(), "video");
        return;
      }
    }

    if (low.startsWith("youtube ")) {
      if (isOffline) {
        res = offlineBlocked("media");
      } else {
        await openMediaByQuery(val.slice(8).trim(), "video");
        return;
      }
    }

    if (low.startsWith("watch ")) {
      if (isOffline) {
        res = offlineBlocked("media");
      } else {
        await openMediaByQuery(val.slice(6).trim(), "video");
        return;
      }
    }

    if (low.startsWith("play ")) {
      if (isOffline) {
        res = offlineBlocked("media");
      } else {
        await openMediaByQuery(val.slice(5).trim(), "video");
        return;
      }
    }
    else if (low.startsWith("music ")) {
      if (isOffline) {
        res = offlineBlocked("media");
      } else {
        await openMediaByQuery(val.slice(6).trim(), "music");
        return;
      }
    }
    else if (low === "stop media" || low === "stop video") {
      stopMedia(true);
      return;
    }
    else if (low === "close media" || low === "close video" || low === "exit media" || low === "exit video") {
      closeMedia(true);
      return;
    }
    else if (low.startsWith("gather ") || shouldAutoGather(val)) {
      if (isOffline) {
        res = offlineBlocked("gather");
      } else {
        res = await gatherIntel(low.startsWith("gather ") ? val : `gather ${val}`);
      }
    }
    else if (low.startsWith("map ")) {
      if (isOffline) {
        res = offlineBlocked("map");
      } else {
        const q = encodeURIComponent(val.substring(4));
        res = `<b>LOCATION:</b><br><iframe width="100%" height="250" style="border:1px solid var(--halo)" src="https://www.google.com/maps?q=${q}&output=embed" allowfullscreen></iframe>`;
      }
    }
    else if (low.startsWith("route ")) {
      if (isOffline) {
        res = offlineBlocked("route");
      } else {
        const parts = val.substring(6).split(" to ");
        if (parts.length === 2) {
          const start = encodeURIComponent(parts[0].trim());
          const end = encodeURIComponent(parts[1].trim());
          res = `<b>ROUTE UPLINK:</b><br><iframe width="100%" height="300" style="border:1px solid var(--halo)" src="https://www.google.com/maps?saddr=${start}&daddr=${end}&output=embed" allowfullscreen></iframe>`;
        } else {
          res = "INVALID ROUTE PARAMS. USE: route [start] to [end]";
        }
      }
    }
    else if (low.startsWith("search ")) {
      if (isOffline) {
        res = offlineBlocked("search");
      } else {
        const query = val.substring(7);
        res = `<b>INTEL UPLINK READY:</b><br>Target: ${query.toUpperCase()}<br><button class="uplink-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(query)}', '_blank')">[ ACCESS GOOGLE DATABASE ]</button>`;
      }
    }
    else if (low.startsWith("bible ")) {
      if (isOffline) {
        res = offlineBlocked("bible uplink");
      } else {
        try {
          const r = await fetch(`https://bible-api.com/${encodeURIComponent(val.substring(6))}`);
          const d = await r.json();
          res = d.text ? `<b>${d.reference}</b><br>${d.text}` : "Missing.";
        } catch {
          res = "BIBLE UPLINK FAILED.";
        }
      }
    }
    else if (isOffline) {
      res = await offlineCommand(val);
    }
    else if (/^[0-9+\-*/().\s×÷]+$/.test(val) && /[+\-*/×÷]/.test(val)) {
      try {
        res = `Result: <b>${Function(`"use strict"; return (${val.replace(/×/g, "*").replace(/÷/g, "/")})`)()}</b>`;
      } catch {
        res = "Error.";
      }
    }
    else {
      if (backendMode !== "web" && backendMode !== "auto") {
        selectedProvider = backendMode;
        sessionStorage.setItem(PROVIDER_KEY, selectedProvider);
      }

      if (backendMode !== "web" && backendMode !== "auto" && normalizeProviderName(selectedProvider) !== "ollama" && !providerHasKey(selectedProvider)) {
        if (!ensureAIProviderReady()) {
          res = "NO AI PROVIDER READY.";
        } else {
          refreshProviderSubLabel();
          res = await askAnyAI();
        }
      } else {
        refreshProviderSubLabel();
        res = await askAnyAI();
      }
    }

    addMsg(res, "bot");
    talk(res);
  }

  function toggleSpectrum() {
    isOffline = !isOffline;
    localStorage.setItem("ok_offline", isOffline);
    location.reload();
  }

  function addMsg(t, s, saveLog = true) {
    const d = document.createElement("div");
    d.className = `msg ${s}`;
    const v = document.getElementById("visor");
    v.appendChild(d);

    const hasHTML = /<[^>]+>/.test(t);

    if (s === "bot" && !hasHTML && !minimalMode) {
      let idx = 0;
      const safeText = String(t);
      function type() {
        if (idx < safeText.length) {
          d.textContent = safeText.substring(0, idx + 1);
          idx++;
          v.scrollTop = v.scrollHeight;
          setTimeout(type, 10);
        }
      }
      type();
    } else if (s === "bot" && !hasHTML) {
      d.textContent = String(t);
      v.scrollTop = v.scrollHeight;
    } else {
      d.innerHTML = t;
      v.scrollTop = v.scrollHeight;
    }

    if (saveLog) {
      db[activeSlot].logs.push({ t, s });
      save();
    }
  }

  function save() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
  }

  function loadSlot(id) {
    activeSlot = id;

    if (id === 11) {
      document.getElementById("sub-label").innerText = "SYSTEM INFO";
    } else if (id === 1) {
      refreshProviderSubLabel();
    } else {
      document.getElementById("sub-label").innerText = `ARCHIVE [ ${id} ]`;
    }

    document.getElementById("visor").innerHTML = '';

    if (id === 11) {
      renderSystemPanel();
    } else {
      db[activeSlot].logs.forEach(l => addMsg(l.t, l.s, false));
      if (id === 1 && authenticated) {
        refreshProviderSubLabel();
      }
    }

    if (document.getElementById("menu").style.display === "block") toggleMenu();
  }

  function toggleMenu() {
    if (!authenticated) {
      document.body.classList.add("emergency-active");
      startSiren();
      return;
    }

    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
    if (m.style.display === "block") renderMenu();
  }

  function renderMenu() {
    const list = document.getElementById("log-list");
    list.innerHTML = "";

    for (let i = 1; i <= 11; i++) {
      const row = document.createElement("div");
      row.className = "log-row";
      row.innerHTML = `
        <div class="log-id" onclick="loadSlot(${i})">${i}</div>
        <div class="log-name" ${i === 11 ? "" : 'contenteditable="true"'} onblur="rename(${i}, this.innerText)">${db[i].name}</div>
        ${i !== 11 ? `<button class="wipe-btn" onclick="wipe(${i})">WIPE</button>` : ""}
      `;
      list.appendChild(row);
    }
  }

  function rename(id, n) {
    if (id === 11) return;
    db[id].name = n;
    save();
  }

  function wipe(id) {
    if (id === 11 || !confirm("Purge?")) return;
    db[id].logs = [];
    save();
    renderMenu();
    loadSlot(id);
  }

  function toggleFullscreen() {
    if (!authenticated) return;
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }

  const micTrigger = document.getElementById("mic-trigger");

  let micPressTimer = null;
  let micLongPressFired = false;

  function setupMicButton() {
    if (!micTrigger) return;

    const startPress = () => {
      micLongPressFired = false;

      micPressTimer = setTimeout(() => {
        micLongPressFired = true;
        stopTalking();
        addMsg("VOICE OUTPUT HALTED.", "bot");
      }, 500);
    };

    const endPress = () => {
      clearTimeout(micPressTimer);
    };

    micTrigger.addEventListener("mousedown", startPress);
    micTrigger.addEventListener("touchstart", startPress, { passive: true });

    micTrigger.addEventListener("mouseup", endPress);
    micTrigger.addEventListener("mouseleave", endPress);
    micTrigger.addEventListener("touchend", endPress);
    micTrigger.addEventListener("touchcancel", endPress);

    micTrigger.addEventListener("click", () => {
      if (micLongPressFired) return;
      startMic();
    });
  }

  function startMic() {
    if (!authenticated) return;
    resumeAudio();
    pauseVoiceAutoRestart(250);
    listenAction(false);
  }

  function listenAction(isAutoRestart = false) {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) {
      if (!isAutoRestart) addMsg("MIC/SPEECH RECOGNITION UNAVAILABLE.", "bot");
      return;
    }

    if (isListening) return;
    if (document.body.classList.contains("talking")) return;
    if (interruptListening) return;
    if (isAutoRestart && !canAutoRestartVoice()) return;

    clearSpeechRestartTimer();

    const r = new Rec();
    activeRecognition = r;
    r.lang = navigator.language || "en-US";
    r.interimResults = false;
    r.maxAlternatives = 1;
    r.continuous = false;

    r.onstart = () => {
      isListening = true;
      setListeningVisual(true);
      document.getElementById("in").placeholder = voiceMode ? "VOICE MODE ACTIVE..." : "LISTENING...";
      if (!isAutoRestart) playTone(1000, "sine", 0.15);
    };

    r.onresult = (e) => {
      const heard = e.results?.[0]?.[0]?.transcript?.trim();
      if (!heard) return;
      setListeningVisual(false);
      document.getElementById("in").value = heard;
      strike();
    };

    r.onerror = (e) => {
      console.error(e);
      setListeningVisual(false);

      const harmless =
        e.error === "aborted" ||
        e.error === "no-speech" ||
        e.error === "network";

      if (!isAutoRestart && !harmless) {
        addMsg(`VOICE INPUT FAILED: ${e.error || "UNKNOWN ERROR"}`, "bot");
      }
    };

    r.onend = () => {
      isListening = false;
      activeRecognition = null;
      setListeningVisual(false);
      document.getElementById("in").placeholder = "Query the Domain...";
      if (voiceMode && authenticated && !document.body.classList.contains("talking")) {
        scheduleVoiceRelisten(650);
      }
    };

    try {
      r.start();
    } catch (e) {
      console.error(e);
      isListening = false;
      activeRecognition = null;
      setListeningVisual(false);
      if (!isAutoRestart) addMsg("VOICE INPUT FAILED TO START.", "bot");
    }
  }

  window.stopMedia = stopMedia;
  window.closeMedia = closeMedia;
  window.toggleMediaFullscreen = toggleMediaFullscreen;
  window.openMediaByVideoId = openMediaByVideoId;
  window.openYoutubeHistoryPanel = openYoutubeHistoryPanel;
  window.setYouTubeApiKey = setYouTubeApiKey;
  window.clearYouTubeApiKey = clearYouTubeApiKey;
</script>
</body>
</html>
