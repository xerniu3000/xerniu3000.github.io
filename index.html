<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OKATAN | V79.95</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    :root { --halo: #4df2ff; --bg: #000a0d; }
    body, html { margin:0; padding:0; font-family: 'Share Tech Mono', monospace; background: var(--bg); color: var(--halo); height: 100dvh; overflow: hidden; transition: background 0.5s ease; touch-action: none; }
    #orbit-canvas { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
    
    .emergency-active { --halo: #ff3e3e !important; background: #200 !important; animation: glitch-shake 0.2s infinite; }
    .emergency-active .bg-layer { background: radial-gradient(circle at center, #800 0%, #000 100%) !important; }
    @keyframes glitch-shake { 0% { transform: translate(0); text-shadow: 2px 0 red, -2px 0 blue; } 50% { transform: translate(-1px, 1px); text-shadow: -2px 0 red, 2px 0 blue; } 100% { transform: translate(0); } }
    
    .bg-layer { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at center, #004b5c 0%, #000a0d 100%); animation: bloom-inverted 6s infinite alternate ease-in-out; }
    @keyframes bloom-inverted { 0% { opacity: 0.8; } 100% { opacity: 0.1; } }

    /* CENTER ENTITY SYNC */
    #okatan-entity { position: absolute; left: 50%; top: 50%; width: 80px; height: 80px; background: var(--halo); margin: -40px; z-index: 5; animation: morph-rotate 12s infinite alternate ease-in-out, entity-shade 6s infinite alternate-reverse ease-in-out; box-shadow: 0 0 30px var(--halo); pointer-events: none; transition: 0.5s; }
    @keyframes entity-shade { 0% { filter: brightness(1.8); } 100% { filter: brightness(0.3); } }
    @keyframes morph-rotate { 0% { border-radius: 50%; transform: rotate(0deg) scale(1); } 50% { border-radius: 10%; transform: rotate(180deg) scale(1.15); } 100% { border-radius: 50%; transform: rotate(360deg) scale(1); } }
    
    .talking #okatan-entity { animation: talking-pulse 0.2s infinite alternate !important; }
    @keyframes talking-pulse { 0% { transform: scale(1); } 100% { transform: scale(1.3); filter: brightness(2); } }

    header { display: flex; align-items: center; justify-content: center; padding: 15px; border-bottom: 2px solid var(--halo); background: rgba(0,0,0,0.9); z-index: 200; position: relative; }
    .pulse-core { width: 45px; height: 45px; position: absolute; left: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .pulse-ring { position: absolute; border: 1.5px solid var(--halo); border-radius: 50%; opacity: 0; animation: wave-out 3s infinite linear; }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    
    /* TOP LEFT TALKING SYNC */
    .talking .pulse-ring { animation-duration: 0.8s !important; border-width: 3px; }
    .pulse-orb { width: 18px; height: 18px; background: var(--halo); border-radius: 50%; z-index: 10; box-shadow: 0 0 15px var(--halo), inset 0 0 5px #fff; animation: core-breathe 2s infinite alternate ease-in-out; }
    .talking .pulse-orb { animation: talking-core 0.15s infinite alternate !important; }
    
    @keyframes wave-out { 0% { width: 10px; height: 10px; opacity: 0.8; } 100% { width: 50px; height: 50px; opacity: 0; } }
    @keyframes core-breathe { 0% { transform: scale(0.9); filter: brightness(0.8); } 100% { transform: scale(1.1); filter: brightness(1.4); } }
    @keyframes talking-core { 0% { transform: scale(1.2); filter: brightness(2); } 100% { transform: scale(0.8); filter: brightness(1); } }

    .title-box { text-align: center; cursor: pointer; user-select: none; }
    .title-box h1 { margin: 0; font-size: 24px; letter-spacing: 6px; }
    #bridge-stats { position: absolute; right: 15px; top: 12px; text-align: right; display: flex; flex-direction: column; gap: 2px; pointer-events: none; }
    #clock { font-size: 11px; letter-spacing: 1px; }
    #weather { font-size: 8px; opacity: 0.7; letter-spacing: 0.5px; white-space: nowrap; }
    
    #menu { position: absolute; inset: 0; background: rgba(0,10,13,0.98); z-index: 300; display: none; padding: 70px 20px 20px; overflow-y: auto; }
    .log-row { display: flex; margin-bottom: 8px; border: 1px solid var(--halo); background: rgba(0,0,0,0.5); }
    .log-id { width: 50px; background: var(--halo); color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .log-name { flex: 1; padding: 12px; color: #fff; font-size: 14px; outline: none; }
    .wipe-btn { background: #ff3e3e; color: #fff; border: none; padding: 0 15px; cursor: pointer; }
    
    #visor { height: calc(100dvh - 180px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; position: relative; }
    .msg { padding: 12px; border: 1px solid var(--halo); background: rgba(0, 20, 30, 0.85); max-width: 85%; font-size: 14px; border-radius: 5px; word-wrap: break-word; line-height: 1.4; }
    .bot { align-self: flex-start; border-left: 4px solid var(--halo); }
    .user { align-self: flex-end; border-right: 4px solid #fff; color: #fff; background: rgba(255,255,255,0.05); }
    
    footer { position: fixed; bottom: 0; width: 100%; padding: 15px; display: flex; gap: 10px; background: #000; z-index: 110; border-top: 2px solid var(--halo); box-sizing: border-box; }
    #in { flex: 1; background: transparent; border: 1px solid var(--halo); padding: 12px; color: var(--halo); font-family: inherit; font-size: 16px; outline: none; }
    .strike-btn { background: var(--halo); color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }
    
    .mic-btn { background: transparent; border: 1px solid var(--halo); color: var(--halo); padding: 0 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; min-width: 50px; }
    .mic-dot { width: 5px; height: 5px; background: var(--halo); border-radius: 50%; transition: all 0.3s ease; }
    
    /* MIC SYNC */
    .talking .mic-dot { border-radius: 2px; width: 3px; }
    .talking .mic-dot:nth-child(1) { animation: mic-wave 0.5s infinite 0.1s alternate; }
    .talking .mic-dot:nth-child(2) { animation: mic-wave 0.5s infinite 0.2s alternate; }
    .talking .mic-dot:nth-child(3) { animation: mic-wave 0.5s infinite 0.3s alternate; }
    @keyframes mic-wave { 0% { height: 4px; } 100% { height: 20px; } }
    .uplink-btn { background: var(--halo); color: #000; border: none; padding: 10px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body onmousedown="isPressing=true" onmouseup="isPressing=false" onmousemove="updateMouse(event)">

<div class="bg-layer"></div>
<canvas id="orbit-canvas"></canvas>
<div id="okatan-entity"></div>

<header>
  <div class="pulse-core" onclick="toggleMenu()">
    <div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div>
    <div class="pulse-orb"></div>
  </div>
  <div class="title-box" onclick="toggleFullscreen()">
    <h1>OKATAN</h1>
    <div id="sub-label" style="font-size:10px;">LOCKED</div>
  </div>
  <div id="bridge-stats"><div id="clock">--:--:--</div><div id="weather">FETCHING...</div></div>
</header>

<div id="menu">
  <div style="font-size: 20px; color: var(--halo); margin-bottom: 20px; cursor:pointer;" onclick="toggleMenu()">× CLOSE ARCHIVE</div>
  <div id="log-list"></div>
</div>

<div id="visor"></div>

<footer>
  <button class="mic-btn" id="mic-trigger" onclick="startMic()">
    <span class="mic-dot"></span><span class="mic-dot"></span><span class="mic-dot"></span>
  </button>
  <input id="in" placeholder="System Lockdown..." type="password" onkeydown="if(event.key==='Enter') strike();">
  <button class="strike-btn" onclick="strike()">STRIKE</button>
</footer>

<script>
  let authenticated = sessionStorage.getItem('ok_auth') === 'true';
  let activeSlot = 1;
  let orbits = [];
  let isPressing = false;
  let mouseX = 0, mouseY = 0;
  let sirenInterval = null;
  let isListeningMode = false; // Persistent state
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const GROQ_KEY = "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";
  const SYSTEM_PROMPT = "You are OKATAN, a tactical AI. Concise, futuristic. No emojis.";

  function updateMouse(e) { mouseX = e.clientX; mouseY = e.clientY; }
  function playTone(freq, type, duration, vol = 0.1) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); }
  function startSiren() { if (sirenInterval) return; sirenInterval = setInterval(() => { playTone(950, 'sawtooth', 0.4, 0.3); setTimeout(() => playTone(650, 'sawtooth', 0.4, 0.3), 200); }, 450); }
  function stopSiren() { clearInterval(sirenInterval); sirenInterval = null; }

  const canvas = document.getElementById('orbit-canvas');
  const ctx = canvas.getContext('2d');
  function initOrbits() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; orbits = []; for(let i=0; i<8; i++) { orbits.push({ angle: Math.random() * Math.PI * 2, radius: 70 + (Math.random() * 40), speed: 0.01 + (Math.random() * 0.015), x: 0, y: 0 }); } }
  function drawOrbits() { ctx.clearRect(0, 0, canvas.width, canvas.height); const cx = canvas.width/2, cy = canvas.height/2; orbits.forEach(o => { o.angle += o.speed; let tx = cx + Math.cos(o.angle) * o.radius, ty = cy + Math.sin(o.angle) * o.radius; if(isPressing) { o.x += (mouseX - o.x) * 0.15; o.y += (mouseY - o.y) * 0.15; } else { o.x += (tx - o.x) * 0.1; o.y += (ty - o.y) * 0.1; } ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--halo'); ctx.beginPath(); ctx.arc(o.x, o.y, 4, 0, Math.PI * 2); ctx.fill(); }); requestAnimationFrame(drawOrbits); }
  window.addEventListener('resize', initOrbits); initOrbits(); drawOrbits();

  let db = JSON.parse(localStorage.getItem('okatan_v79_db')) || Array(12).fill(null).map((_, i) => ({ id: i, name: i === 11 ? "SYSTEM INFO" : `Archive Slot ${i}`, logs: [] }));

  function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); }
  async function fetchWeather() { try { const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=52.31&longitude=-114.10&current_weather=true`).then(r => r.json()); document.getElementById('weather').innerText = `SYLVAN LAKE: ${Math.round(w.current_weather.temperature)}°C`; } catch(e) { document.getElementById('weather').innerText = "OFFLINE"; } }

  window.onload = () => { 
    if(authenticated) { unlockUI(); } 
    updateClock(); setInterval(updateClock, 1000); fetchWeather();
  };

  function unlockUI() {
    const i = document.getElementById('in'); i.type = "text"; i.placeholder = "Query the Domain...";
    document.getElementById('sub-label').innerText = "BRIDGE SYNCED"; loadSlot(1);
  }

  function talk(txt) { 
    window.speechSynthesis.cancel(); 
    const u = new SpeechSynthesisUtterance(txt.replace(/<[^>]*>/g, '')); 
    u.pitch = 0.8; u.rate = 1.1; 
    document.body.classList.add('talking'); 
    u.onend = () => {
      document.body.classList.remove('talking');
      if(isListeningMode) runBackgroundEar(); // Keep the ear open after talking
    };
    window.speechSynthesis.speak(u); 
  }

  async function strike() {
    const i = document.getElementById('in'); let val = i.value.trim(); if(!val) return;
    if(!authenticated) { 
      if(val === "2644") { authenticated = true; sessionStorage.setItem('ok_auth', 'true'); unlockUI(); talk("Bridge synced."); playTone(600, 'square', 0.2, 0.1); i.value = ''; } 
      else { document.body.classList.add('emergency-active'); startSiren(); talk("Unauthorized."); i.value = ''; }
      return; 
    }
    if(activeSlot === 11) { addMsg("ARCHIVE 11 READ-ONLY.", "bot"); i.value = ''; return; }
    addMsg(val, 'user'); i.value = ''; const low = val.toLowerCase();
    
    if (["help", "emergency"].includes(low)) { document.body.classList.add('emergency-active'); startSiren(); addMsg("<b>CRITICAL STATE ACTIVE.</b>", "bot"); return; }
    if (["clear", "stand down"].includes(low)) { document.body.classList.remove('emergency-active'); stopSiren(); addMsg("Systems nominal.", "bot"); return; }
    
    let res = "";
    if (low.startsWith("route ")) {
      const parts = low.substring(6).split(" to ");
      if(parts.length === 2) res = `<b>ROUTE UPLINK:</b><br><iframe width="100%" height="300" src="https://www.google.com/maps?saddr=${encodeURIComponent(parts[0])}&daddr=${encodeURIComponent(parts[1])}&output=embed" frameborder="0"></iframe>`;
    } 
    else if (low.startsWith("map ")) { res = `<b>LOCATION:</b><br><iframe width="100%" height="250" src="https://maps.google.com/maps?q=${encodeURIComponent(val.substring(4))}&output=embed" frameborder="0"></iframe>`; }
    else if (low.startsWith("search ")) {
      const query = val.substring(7);
      res = `<b>INTEL UPLINK READY:</b><br>Target: ${query.toUpperCase()}<br><button class="uplink-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(query)}', '_blank')">[ ACCESS GOOGLE DATABASE ]</button>`;
    }
    else if (low.startsWith("bible ")) { try { const r = await fetch(`https://bible-api.com/${encodeURIComponent(val.substring(6))}`); const d = await r.json(); res = d.text ? `<b>${d.reference}</b><br>${d.text}` : "Missing."; } catch(e) { res = "Offline."; } } 
    else if (/^[0-9+\-*/().\s×÷]+$/.test(val) && /[+\-*/×÷]/.test(val)) { try { res = `Result: <b>${eval(val.replace(/×/g, '*').replace(/÷/g, '/'))}</b>`; } catch(e) { res = "Error."; } } 
    else {
      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_KEY}` },
          body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: val }] })
        });
        const data = await response.json();
        res = data.choices[0].message.content;
      } catch (e) { res = "Neural link failed."; }
    }
    addMsg(res, "bot"); talk(res);
  }

  function addMsg(t, s, saveLog = true) {
    const d = document.createElement('div'); d.className = `msg ${s}`; const v = document.getElementById('visor'); v.appendChild(d);
    if (s === 'bot') { 
      let i = 0; function type() { if (i < t.length) { d.innerHTML = t.substring(0, i+1); i++; v.scrollTop = v.scrollHeight; setTimeout(type, 10); } } type(); 
    } else { d.innerHTML = t; v.scrollTop = v.scrollHeight; }
    if(saveLog) { db[activeSlot].logs.push({t, s}); save(); }
  }
  function save() { localStorage.setItem('okatan_v79_db', JSON.stringify(db)); }
  function loadSlot(id) { activeSlot = id; document.getElementById('sub-label').innerText = `ARCHIVE [ ${id} ]`; document.getElementById('visor').innerHTML = ''; db[activeSlot].logs.forEach(l => addMsg(l.t, l.s, false)); if(document.getElementById('menu').style.display === 'block') toggleMenu(); }
  function toggleMenu() { const m = document.getElementById('menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; if(m.style.display === 'block') renderMenu(); }
  function renderMenu() {
    const list = document.getElementById('log-list'); list.innerHTML = '';
    for(let i=1; i<=11; i++) {
      const row = document.createElement('div'); row.className = 'log-row';
      row.innerHTML = `<div class="log-id" onclick="loadSlot(${i})">${i}</div><div class="log-name" ${i===11?'':'contenteditable="true"'} onblur="rename(${i}, this.innerText)">${db[i].name}</div>${i!==11?`<button class="wipe-btn" onclick="wipe(${i})">WIPE</button>`:''}`;
      list.appendChild(row);
    }
  }
  function rename(id, n) { if(id === 11) return; db[id].name = n; save(); }
  function wipe(id) { if(id === 11 || !confirm("Purge?")) return; db[id].logs = []; save(); renderMenu(); loadSlot(id); }
  function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

  // RECONSTRUCTED VOICE ENGINE
  function startMic() {
    isListeningMode = true;
    listenAction();
  }

  function listenAction() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Rec) return;
    const r = new Rec();
    r.onstart = () => { 
      document.getElementById('in').placeholder = "LISTENING..."; 
      playTone(1000, 'sine', 0.15); // Wake tone
    };
    r.onresult = (e) => { 
      document.getElementById('in').value = e.results[0][0].transcript; 
      strike(); 
    };
    r.onend = () => { 
      document.getElementById('in').placeholder = "Query the Domain..."; 
    };
    r.start();
  }

  function runBackgroundEar() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Rec) return;
    const ear = new Rec();
    ear.onresult = (e) => {
      const txt = e.results[0][0].transcript.toLowerCase();
      if (txt.includes("katana") || txt.includes("hey katana")) {
        ear.stop();
        listenAction();
      }
    };
    ear.onend = () => { 
      if(isListeningMode && !window.speechSynthesis.speaking) {
        setTimeout(runBackgroundEar, 300);
      }
    };
    ear.start();
  }
</script>
</body>
</html>
