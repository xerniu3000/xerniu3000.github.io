<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OKATAN | LOADING</title>
    <style>
        body { 
            margin: 0; 
            background: #000a0d; /* Matches your main app background */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #status-text {
            position: relative;
            z-index: 2;
            color: #4df2ff; /* Your Cyan color */
            font-family: "Share Tech Mono", monospace;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #4df2ff;
            background: rgba(0, 10, 13, 0.8);
            padding: 10px 20px;
            border: 1px solid #4df2ff;
        }
    </style>
</head>
<body>

    <div id="status-text">INITIALIZING KATANAVERSE...</div>
    <canvas id="matrix"></canvas>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 10, 13, 0.1)'; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#4df2ff'; // Using your Cyan instead of Green
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(draw, 30);

        // This moves the user to your main file after 3 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3500);
    </script>
</body>
</html>
